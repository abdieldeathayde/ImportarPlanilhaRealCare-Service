# ==========================================
# CONFIGURAÇÃO DO SERVIDOR
# ==========================================
server.port=8080

# Configurações do Banco H2 em memória
spring.datasource.url=jdbc:mysql://localhost:3306/RealCar
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.username=Abdiel
spring.datasource.password=Neguinho2010@

# Libera o console visual do H2 no navegador (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# ==========================================
# REGRAS PARA UPLOAD DE ARQUIVOS (MULTIPART)
# ==========================================
# Define o tamanho máximo permitido para um único arquivo (Ex: planilha grande)
spring.servlet.multipart.max-file-size=10MB

# Define o tamanho máximo permitido para a requisição inteira (arquivos + dados do formulário)
spring.servlet.multipart.max-request-size=10MB

# Habilita o suporte a requisições multipart (necessário para o MultipartFile)
spring.servlet.multipart.enabled=true

# ==========================================
# CONFIGURAÇÃO DE LOGS (OPCIONAL - AJUDA NO DEBUG)
# ==========================================
# Mostra logs detalhados do Spring MVC caso ocorra algum erro na rota/endpoint
logging.level.org.springframework.web=DEBUG